name: Java CI (Maven + TestNG)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || true
          google-chrome --version || true

      - name: Run TestNG Shard ${{ matrix.shard }}
        run: mvn -B -e test -Dsurefire.suiteXmlFiles=testng-shard${{ matrix.shard }}.xml

      - name: Upload Surefire reports (Shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-shard-${{ matrix.shard }}
          path: target/surefire-reports
