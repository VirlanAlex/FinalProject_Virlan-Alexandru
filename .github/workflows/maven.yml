name: Java CI (Maven + TestNG)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Ruleaza testele pe 3 masini virtuale
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard-index: [0, 1, 2]
        shard-total: [3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Instalare Chrome stabila si garantata pe GitHub Actions
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Verify Chrome installation
        run: |
          google-chrome --version
          which google-chrome

      - name: Generate testng-shard.xml for this machine
        run: |
          SHARD_INDEX=${{ matrix.shard-index }}
          SHARD_TOTAL=${{ matrix.shard-total }}

          ALL_CLASSES=$(find src/test/java/tests -name "*.java" \
            | sed 's|src/test/java/||' \
            | sed 's|/|.|g' \
            | sed 's|\.java$||' \
            | sort)

          SHARD_CLASSES=""
          INDEX=0
          while IFS= read -r CLASS; do
            MOD=$((INDEX % SHARD_TOTAL))
            if [ "$MOD" -eq "$SHARD_INDEX" ]; then
              SHARD_CLASSES="${SHARD_CLASSES}        <class name=\"${CLASS}\"/>\n"
            fi
            INDEX=$((INDEX + 1))
          done <<< "$ALL_CLASSES"

          {
            echo '<!DOCTYPE suite SYSTEM "https://testng.org/testng-1.0.dtd">'
            echo "<suite name=\"Shard${SHARD_INDEX}\" parallel=\"classes\" thread-count=\"2\">"
            echo "    <test name=\"ShardTests\">"
            echo "        <classes>"
            printf "$SHARD_CLASSES"
            echo "        </classes>"
            echo "    </test>"
            echo "</suite>"
          } > testng-shard.xml

          echo "--- testng-shard.xml generat ---"
          cat testng-shard.xml

      - name: Run TestNG Shard ${{ matrix.shard-index }}
        run: mvn -B -e test -Dsurefire.suiteXmlFiles=testng-shard.xml

      - name: Upload screenshots on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-shard-${{ matrix.shard-index }}
          path: target/screenshots/


      - name: Upload Surefire reports (Shard ${{ matrix.shard-index }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-shard-${{ matrix.shard-index }}
          path: target/surefire-reports

  # ─────────────────────────────────────────────
  # JOB 2: Insumeaza rapoartele dupa toate shardurile
  # ─────────────────────────────────────────────
  merge-reports:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Download reports from Shard 0
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports-shard-0
          path: merged-reports/shard-0

      - name: Download reports from Shard 1
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports-shard-1
          path: merged-reports/shard-1

      - name: Download reports from Shard 2
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports-shard-2
          path: merged-reports/shard-2

      - name: Merge all XML reports into one folder
        run: |
          mkdir -p merged-reports/all-xml

          find merged-reports/shard-0 -name "TEST-tests.*.xml" -exec cp {} merged-reports/all-xml/ \;
          find merged-reports/shard-1 -name "TEST-tests.*.xml" -exec cp {} merged-reports/all-xml/ \;
          find merged-reports/shard-2 -name "TEST-tests.*.xml" -exec cp {} merged-reports/all-xml/ \;

          echo "Fisiere XML combinate:"
          ls -la merged-reports/all-xml/

          echo ""
          echo "========== SUMAR TOTAL =========="

          TOTAL_TESTS=$(grep -r '@Test' src/test/java/tests/ | grep -v '//' | wc -l)

          PASSED=0
          FAILED=0
          SKIPPED=0

          for f in merged-reports/all-xml/TEST-tests.*.xml; do
            CLASS=$(basename "$f" .xml | sed 's/TEST-tests\.//')

            HAS_FAILURE=$(grep -c '<failure\|<error' "$f" 2>/dev/null || echo 0)
            HAS_SKIPPED=$(grep -c '<skipped' "$f" 2>/dev/null || echo 0)

            if [ "$HAS_SKIPPED" -gt 0 ]; then
              STATUS="SKIPPED ⚠️"
              SKIPPED=$((SKIPPED + 1))
            elif [ "$HAS_FAILURE" -gt 0 ]; then
              STATUS="FAILED ❌"
              FAILED=$((FAILED + 1))
            else
              STATUS="PASSED ✅"
              PASSED=$((PASSED + 1))
            fi

            echo "  $CLASS → $STATUS"
          done

          echo ""
          echo "  ─────────────────────────────"
          echo "  Total:   $TOTAL_TESTS teste"
          echo "  Passed:  $PASSED ✅"
          echo "  Failed:  $FAILED ❌"
          echo "  Skipped: $SKIPPED ⚠️"
          echo "=================================="

          {
            echo "========== SUMAR TOTAL TESTE =========="
            echo "Total:    $TOTAL_TESTS"
            echo "Passed:   $PASSED"
            echo "Failed:   $FAILED"
            echo "Skipped:  $SKIPPED"
            echo "======================================="
          } > merged-reports/SUMMARY.txt

      - name: Generate combined HTML report
        run: |
          mkdir -p target/surefire-reports
          cp merged-reports/all-xml/*.xml target/surefire-reports/
          mvn --no-transfer-progress surefire-report:report-only -Daggregate=true || true

      - name: Upload merged report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RAPORT-COMBINAT-TOATE-SHARDURILE
          path: |
            merged-reports/all-xml/
            merged-reports/SUMMARY.txt
            target/site/surefire-report.html
