name: Java CI (Maven + TestNG)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Ruleaza testele pe 3 masini virtuale
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard-index: [0, 1, 2]
        shard-total: [3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || true
          google-chrome --version || true

      - name: Generate testng-shard.xml for this machine
        run: |
          SHARD_INDEX=${{ matrix.shard-index }}
          SHARD_TOTAL=${{ matrix.shard-total }}

          ALL_CLASSES=$(find src/test/java/tests -name "*.java" \
            | sed 's|src/test/java/||' \
            | sed 's|/|.|g' \
            | sed 's|\.java$||' \
            | sort)

          SHARD_CLASSES=""
          INDEX=0
          while IFS= read -r CLASS; do
            MOD=$((INDEX % SHARD_TOTAL))
            if [ "$MOD" -eq "$SHARD_INDEX" ]; then
              SHARD_CLASSES="${SHARD_CLASSES}        <class name=\"${CLASS}\"/>\n"
            fi
            INDEX=$((INDEX + 1))
          done <<< "$ALL_CLASSES"

          {
            echo '<!DOCTYPE suite SYSTEM "https://testng.org/testng-1.0.dtd">'
            echo "<suite name=\"Shard${SHARD_INDEX}\" parallel=\"classes\" thread-count=\"2\">"
            echo "    <test name=\"ShardTests\">"
            echo "        <classes>"
            printf "$SHARD_CLASSES"
            echo "        </classes>"
            echo "    </test>"
            echo "</suite>"
          } > testng-shard.xml

          echo "--- testng-shard.xml generat ---"
          cat testng-shard.xml

      - name: Run TestNG Shard ${{ matrix.shard-index }}
        run: mvn -B -e test -Dsurefire.suiteXmlFiles=testng-shard.xml

      - name: Upload Surefire reports (Shard ${{ matrix.shard-index }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-shard-${{ matrix.shard-index }}
          path: target/surefire-reports

  # ─────────────────────────────────────────────
  # JOB 2: Insumeaza rapoartele dupa toate shardurile
  # ─────────────────────────────────────────────
  merge-reports:
    runs-on: ubuntu-latest
    needs: test          # asteapta sa termine toate cele 3 masini
    if: always()         # ruleaza chiar daca unele teste au picat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Descarca rapoartele de pe toate cele 3 masini virtuale
      - name: Download reports from Shard 0
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports-shard-0
          path: merged-reports/shard-0

      - name: Download reports from Shard 1
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports-shard-1
          path: merged-reports/shard-1

      - name: Download reports from Shard 2
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports-shard-2
          path: merged-reports/shard-2

      # Combina toate fisierele XML intr-un singur folder
      - name: Merge all XML reports into one folder
        run: |
          mkdir -p merged-reports/all-xml

          # Copiaza toate fisierele TEST-*.xml din fiecare shard
          find merged-reports/shard-0 -name "TEST-*.xml" -exec cp {} merged-reports/all-xml/ \;
          find merged-reports/shard-1 -name "TEST-*.xml" -exec cp {} merged-reports/all-xml/ \;
          find merged-reports/shard-2 -name "TEST-*.xml" -exec cp {} merged-reports/all-xml/ \;

          echo "Fisiere XML combinate:"
          ls -la merged-reports/all-xml/

          # Calculeaza sumarul total (passed/failed/skipped)
          echo ""
          echo "========== SUMAR TOTAL =========="
          TOTAL_TESTS=0
          TOTAL_FAILURES=0
          TOTAL_ERRORS=0
          TOTAL_SKIPPED=0

          for f in merged-reports/all-xml/TEST-*.xml; do
            TESTS=$(grep -oP 'tests="\K[0-9]+' "$f" | head -1 || echo 0)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1 || echo 0)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' "$f" | head -1 || echo 0)
            SKIPPED=$(grep -oP 'skipped="\K[0-9]+' "$f" | head -1 || echo 0)
            CLASS=$(basename "$f" .xml | sed 's/TEST-//')

            echo "  $CLASS → tests=$TESTS  failures=$FAILURES  errors=$ERRORS  skipped=$SKIPPED"

            TOTAL_TESTS=$((TOTAL_TESTS + TESTS))
            TOTAL_FAILURES=$((TOTAL_FAILURES + FAILURES))
            TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
            TOTAL_SKIPPED=$((TOTAL_SKIPPED + SKIPPED))
          done

          echo ""
          echo "  TOTAL: tests=$TOTAL_TESTS  failures=$TOTAL_FAILURES  errors=$TOTAL_ERRORS  skipped=$TOTAL_SKIPPED"
          PASSED=$((TOTAL_TESTS - TOTAL_FAILURES - TOTAL_ERRORS - TOTAL_SKIPPED))
          echo "  PASSED: $PASSED / $TOTAL_TESTS"
          echo "=================================="

          # Scrie sumarul intr-un fisier text pentru artifact
          {
            echo "========== SUMAR TOTAL TESTE =========="
            echo "Total:    $TOTAL_TESTS"
            echo "Passed:   $PASSED"
            echo "Failed:   $((TOTAL_FAILURES + TOTAL_ERRORS))"
            echo "Skipped:  $TOTAL_SKIPPED"
            echo "======================================="
          } > merged-reports/SUMMARY.txt

      # Genereaza un raport HTML combinat cu Maven Surefire Report
      - name: Generate combined HTML report
        run: |
          mkdir -p target/surefire-reports
          cp merged-reports/all-xml/*.xml target/surefire-reports/
          mvn --no-transfer-progress surefire-report:report-only -Daggregate=true || true
          echo "Raport HTML generat in target/site/surefire-report.html"

      # Incarca raportul final combinat ca artifact
      - name: Upload merged report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RAPORT-COMBINAT-TOATE-SHARDURILE
          path: |
            merged-reports/all-xml/
            merged-reports/SUMMARY.txt
            target/site/surefire-report.html
